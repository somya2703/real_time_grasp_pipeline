yolo:
  # Model paths (prefer TensorRT engine for speed, fallback to pt)
  engine_path: /workspace/models/yolov8n.engine
  pt_path: /workspace/models/yolov8n.pt

  # Detection thresholds
  confidence_threshold: 0.4
  iou_threshold: 0.45

  # Input resolution
  input_width: 640
  input_height: 640

  
  device: cuda